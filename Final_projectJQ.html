<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script>

    // ================= GLOBALS =================
    let map;
    let color_map = {};

    const drawnItems = new L.FeatureGroup();
    const selectedItems = new L.FeatureGroup();
    const computedItems = new L.FeatureGroup();
    let selected_ids = [];


    // ================= HELPERS =================
    function changeSelectedColor(color) {
        selectedItems.eachLayer(layer => {
            layer.setStyle({ color });
            color_map[layer._leaflet_id] = color;
        });
        selectedItems.clearLayers();
    }

    function addLayerEvents(layer) {
        layer.on("click", function () {
            if (selectedItems.hasLayer(layer)) {
                selectedItems.removeLayer(layer);
                layer.setStyle({ color: color_map[layer._leaflet_id] || "blue" });
                getArea();
                if (selectedItems.getLayers().length === 0){
                    $("#area").html("").hide();
                }
            } else {
                layer.setStyle({ color: "red" });
                selectedItems.addLayer(layer);
                getArea();
            }

        });
    }

    function addToDrawnItemsLayer(layer) {
        drawnItems.addLayer(layer);
        color_map[layer._leaflet_id] = layer.options.color || "blue";
    }

    function convertLayerToGeoJson(layer) {
        if (layer instanceof L.Circle) {
            return turf.circle(
                [layer.getLatLng().lng, layer.getLatLng().lat],
                layer.getRadius(),
                { units: "meters" }
            );
        }
        return layer.toGeoJSON();
    }

    function draw_store(result) {
        if (!result) {
            alert("Operation failed");
            return;
        }

        const layer = L.geoJSON(result);
        layer.eachLayer(l => {
            addLayerEvents(l);
            addToDrawnItemsLayer(l);
        });
    }


    // ================= HANDLE FUNCTIONS =================

    function handleUnionClick() {
        const layers = selectedItems.getLayers();
        if (layers.length < 2) return alert("Need 2 polygons");

        let result = computeUnion(layers);
        draw_store(result);
    }

    function handleIntersectionClick() {
        const layers = selectedItems.getLayers();
        if (layers.length < 2) return alert("Need 2 polygons");

        let result = computeIntersection(layers);
        draw_store(result);
    }

    function handleSubtractionClick() {
        const layers = selectedItems.getLayers();
        if (layers.length < 2) return alert("Need 2 polygons");

        let result = computeSubtraction(selected_ids);
        draw_store(result);
    }

    function getArea() {
        const layers = selectedItems.getLayers();
        if (layers.length === 0) {
            $("#area").html("").hide();
        }
        const unionBoth = computeUnion(layers);
        let total = turf.area(unionBoth);
        layers.forEach(layer => {
            let current = convertLayerToGeoJson(layer);
            let area = turf.area(current);
            console.log(area);
            layer.bindPopup("Area: " + area.toFixed(3) + " m²").openPopup();

        });
        // const ele = document.getElementById("area");
        // ele.innerHTML = "Area: " + total + " m2";
        // ele.style = "";
        $("#area").html("Area: " + total + " m2").show();

    }


    // ================= COMPUTE FUNCTIONS =================

    function computeUnion(layers) {
        let current = convertLayerToGeoJson(layers[0]);

        for (let i = 1; i < layers.length; i++) {
            current = turf.union(current, convertLayerToGeoJson(layers[i]));
            if (!current) return null;
        }
        return current;
    }

    function computeIntersection(layers) {
        let current = convertLayerToGeoJson(layers[0]);

        for (let i = 1; i < layers.length; i++) {
            current = turf.intersect(current, convertLayerToGeoJson(layers[i]));
            if (!current) return null;
        }
        return current;
    }

    function computeSubtraction(ids) {
        let current = convertLayerToGeoJson(selectedItems.getLayer(ids[0]));

        for (let i = 1; i < ids.length; i++) {
            current = turf.difference(
                current,
                convertLayerToGeoJson(selectedItems.getLayer(ids[i]))
            );
            if (!current) return null;
        }
        return current;
    }
    // =======> JQUERY EVENTS
    // $(document).ready(function () {})
    const colors = [
        {value: " ", text: "Color"},
        {value: "Red", text: "Red"},
        {value: "Green", text: "Green"},
        {value: "Pink", text: "Pink"},
        {value: "Black", text: "Black"},
        {value: "Purple", text: "Purple"},
    ];
    $(function () {
        $("#unionBtn").click(handleUnionClick);
        $("#intersectionBtn").click(handleIntersectionClick);
        $("#subtractionBtn").click(handleSubtractionClick);

        $("#create_geojson").click(evt_listener);
        const $geojsonFile = $("#geojsonFile");
        $("#loadFileBtn").click(() => $geojsonFile.click());

        $geojsonFile.change(function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function () {
                const geojson = JSON.parse(reader.result);
                const layer = L.geoJSON(geojson);

                layer.eachLayer(addToDrawnItemsLayer);
                map.fitBounds(layer.getBounds());
            };

            reader.readAsText(file);
        });


        /* function evt_listener(e) {
            e.preventDefault();

     try {
        const textArea = document.getElementById("text");
        const geojson = JSON.parse(textArea.value);

        const layer = L.geoJSON(geojson);

        layer.eachLayer(function (l) {
            addToDrawnItemsLayer(l);
        });

        map.fitBounds(layer.getBounds());

    } catch (err) {
        alert("Invalid GeoJSON");
    }
}   up is JS version */      //=======> Text input:
        function evt_listener(e) {
            e.preventDefault();
            const input = $("#text").val();
            if (input.length < 2) return;
            try {
                const geojson = JSON.parse(input);
                const layer = L.geoJSON(geojson);

                layer.eachLayer(addToDrawnItemsLayer);
                map.fitBounds(layer.getBounds());

            } catch (err) {
                alert("Invalid GeoJSON");
            }
        }
        // $("#changeSelectedColor-select").change(function () {
        //     const color = $(this).val();
        //     if (color) changeSelectedColor(color);
        // });

        map = L.map("map").setView([46.7785, 6.6412], 13);

        const osm = L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            { maxZoom: 19 }
        ).addTo(map);

        map.addLayer(drawnItems);//a folder that stores all your shapes

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems }
        });

        map.addControl(drawControl); //Creates drawing toolbar (from Leaflet Draw) let users draw,edit,delete them

        map.on(L.Draw.Event.CREATED, function (e) {//show draw toolbar, This actually puts the buttons on the map
            const layer = e.layer; //e.layer=new polygon
            addLayerEvents(layer);//makes it clickable/selectable
            addToDrawnItemsLayer(layer);//stores it
        });

        map.on(L.Draw.Event.DELETED, function (e) {
            const layers = e.layers;

            layers.eachLayer(layer => {
                selectedItems.removeLayer(layer);
            });
        });

        L.control.layers({ OSM: osm }, { //Creates a small panel where user can:Turn base map ON/OFF (OSM),Show/hide your polygons (Drawn)
            "Drawn": drawnItems
        }).addTo(map);


    const controls = $("#controls");
    const unionBtn = $("<button>", {
        "type": "button",
        id: "unionBtn", text: "Union", "class": "btn btn-primary"
    });
        unionBtn.on("click", handleUnionClick);

    controls.append(unionBtn);

    const intersectionBtn = $("<button>", {"type": "button",
        id: "intersectionBtn", text: "Intersection", "class": "btn btn-primary"
    });
    intersectionBtn.on("click", handleIntersectionClick);
    controls.append(intersectionBtn);

    const subtractionBtn = $("<button>", {"type": "button",
        id: "subtractionBtn", text: "Subtraction", "class": "btn btn-primary"
    });
    subtractionBtn.on("click", handleSubtractionClick);
    controls.append(subtractionBtn);

    /*const create_geojson = $("<button>", {
        id: "create_geojson", text: "Add Polygon from Text"
    });
    create_geojson.on("click", create_geojson);
    controls.append(create_geojson);*/

    const loadFileBtn = $("<button>", {"type": "button",
        id: "loadFileBtn", text: "Add Polygon From File", "class": "btn btn-primary"
    });
    loadFileBtn.on("click", loadFileBtn);
    controls.append(loadFileBtn);


    const control2 = $("#controls2");
    const select = $("<select>", {"class": "form-select"});
    select.on("change",  function (e) {
        const color = $(this).val();
        if (color) changeSelectedColor(color);
    });
    control2.append(select);
    colors.forEach(color => {
        const opt = $("<option>", {"value": color.value}).html(color.text);
        select.append(opt);
    })
});


</script>

</body>
