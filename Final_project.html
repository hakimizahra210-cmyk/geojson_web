<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Polygon Drawing Tool</title>

<!-- Leaflet CSS -->
<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Turf.js -->
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
}

#map {
width: 100%;
height: 90vh;
}

#controls {
padding: 10px;
background: #f0f0f0;
}

button {
margin: 3px;
padding: 5px 10px;
font-size: 14px;
}
</style>
</head>

<body>
    <h1>My first project :))</h1>

<div id="controls">
<button onclick="drawPolygon()">Draw Polygon</button>
<button onclick="unionPolygons()">Union</button>
<button onclick="intersection()">Intersection</button>
<button onclick="substraction()">Subtraction</button>
<button onclick="allSubstraction()">Clear Map</button>
<p style="font-size:12px; color:gray;">
*Tip:  Click points on the map to create a polygon,operations use the last two polygons.
</p>
</div>

<div id="map"></div>

<script>
// Create map
const map = L.map('map').setView([46.7785, 6.6412], 13);

// OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

// Variables
let points = [];
let markers = [];
let polygons = [];
const colors = ['purple', 'orange', 'green', 'blue', 'pink'];
let colorIndex = 0;

// Map click to add points
map.on('click', function(e) {
const latlng = [e.latlng.lat, e.latlng.lng];
points.push(latlng);
const marker = L.marker(latlng).addTo(map);
markers.push(marker);
});

// to draw polygon from points
function drawPolygon() {
if(points.length < 3) {
alert("Need at least 3 points to draw a polygon");
return;
}

const color = colors[colorIndex % colors.length];
colorIndex++;

const polygon = L.polygon(points, { color: color }).addTo(map);
polygons.push(polygon);

// Reset
points = [];
markers.forEach(m => map.removeLayer(m));
markers = [];
}

// Union of last two polygons
function unionPolygons() {
if(polygons.length < 2) {
alert("Create at least two polygons for union");
return;
}

const geo1 = polygons[polygons.length - 2].toGeoJSON();
const geo2 = polygons[polygons.length - 1].toGeoJSON();

try {
const union = turf.union(geo1, geo2);
L.geoJSON(union, { color: 'red' }).addTo(map);
} catch(e) {
}
}

// Intersection of last two polygons
function intersection() {
if(polygons.length < 2) {
alert("Create at least two polygons for intersection");
return;
}

const geo1 = polygons[polygons.length - 2].toGeoJSON();
const geo2 = polygons[polygons.length - 1].toGeoJSON();

const inter = turf.intersect(geo1, geo2);
if(inter) {
L.geoJSON(inter, { color: 'blue' }).addTo(map);
} else {
alert("No intersection between the last two polygons");
}
}

//other possibility for subtraction: all polygons minus last one
/*function substraction() {
    polygons.forEach(p => map.removeLayer(p));
    polygons = [];
 */
// Subtraction: last polygon minus second last
function substraction() {
if(polygons.length < 2) {
alert("Create at least two polygons for subtraction");
return;
}

const geo1 = polygons[polygons.length - 2].toGeoJSON();
const geo2 = polygons[polygons.length - 1].toGeoJSON();

const diff = turf.difference(geo1, geo2);
if(diff) {
L.geoJSON(diff, { color: 'blue' }).addTo(map);
} else {
alert("No difference found");
}
}

// Clear all polygons and markers
function allSubstraction() {
    map.eachLayer(function (layer) {
        if (!(layer instanceof L.TileLayer)) {
            map.removeLayer(layer);
        }
    });
}
</script>

</body>
</html>
